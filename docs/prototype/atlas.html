function CityLights(){const ref=useRef(null);useEffect(()=>{const c=ref.current;if(!c)return;const ctx=c.getContext("2d");let w=c.width=c.parentElement.offsetWidth;let h=c.height=c.parentElement.offsetHeight;const raw=[[.52,.28,1],[.50,.30,.8],[.53,.32,.6],[.48,.34,.7],[.51,.35,.5],[.55,.30,.4],[.47,.37,.6],[.20,.32,.9],[.22,.35,.7],[.18,.34,.6],[.25,.38,.5],[.15,.30,.7],[.72,.30,.9],[.75,.28,.7],[.78,.32,.8],[.68,.34,.6],[.80,.35,.5],[.30,.60,.7],[.32,.55,.5],[.52,.48,.5],[.50,.55,.4],[.60,.34,.5],[.68,.38,.8],[.70,.40,.6],[.83,.62,.4]];const dots=raw.map(([px,py,s])=>({x:px*w,y:py*h,s,phase:Math.random()*Math.PI*2,speed:.2+Math.random()*.35,baseR:3+s*6}));let t=0,drift=0,raf;const draw=()=>{t+=.008;drift+=.15;ctx.clearRect(0,0,w,h);ctx.globalAlpha=.05;ctx.fillStyle="#8ecba0";ctx.beginPath();ctx.ellipse(w*.52,h*.32,w*.06,h*.08,-.1,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(w*.20,h*.34,w*.08,h*.07,.1,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(w*.74,h*.33,w*.1,h*.08,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;dots.forEach(d=>{const pulse=.5+.5*Math.sin(t*d.speed+d.phase);const r=d.baseR*(.6+pulse*.4);const ox=Math.sin(drift*.003+d.phase)*.8;const x=d.x+ox;const grad=ctx.createRadialGradient(x,d.y,0,x,d.y,r*6);grad.addColorStop(0,`rgba(255,190,90,${.45*pulse*d.s})`);grad.addColorStop(.3,`rgba(240,150,60,${.2*pulse*d.s})`);grad.addColorStop(1,"rgba(210,120,60,0)");ctx.fillStyle=grad;ctx.beginPath();ctx.arc(x,d.y,r*6,0,Math.PI*2);ctx.fill();ctx.fillStyle=`rgba(255,${200+Math.round(pulse*30)},${120+Math.round(pulse*40)},${(.6+pulse*.4)*d.s})`;ctx.beginPath();ctx.arc(x,d.y,r,0,Math.PI*2);ctx.fill();ctx.fillStyle=`rgba(255,245,230,${.6*pulse*d.s})`;ctx.beginPath();ctx.arc(x,d.y,r*.4,0,Math.PI*2);ctx.fill()});raf=requestAnimationFrame(draw)};draw();const onR=()=>{w=c.width=c.parentElement.offsetWidth;h=c.height=c.parentElement.offsetHeight;dots.forEach((d,i)=>{d.x=raw[i][0]*w;d.y=raw[i][1]*h})};window.addEventListener("resize",onR);return()=>{cancelAnimati olid transparent",background:theme===k?"rgba(255,255,255,0.04)":"rgba(255,255,255,0.015)"}}><div style={{display:"flex",gap:2,marginBottom:5,borderRadius:3,overflow:"hidden"}}>{v.colors.map((c,i)=><div key={i} style={{flex:1,height:10,background:c}}/>)}</div><span style={{fontSize:10,color:theme===k?tx:tx2}}>{v.name}</span></button>)}</div><span style={{fontSize:10,color:tx3,display:"block",marginBottom:8}}>Data source</span><div style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${bd}`,borderRadius:7,padding:"9px 12px",marginBottom:18,fontSize:11,color:tx2,cursor:"pointer"}}>Pop. Density / State ▾</div><span style={{fontSize:10,color:tx3,display:"block",marginBottom:6}}>Opacity</span><div style={{height:5,background:"rgba(255,255,255,0.04)",borderRadius:3,marginBottom:16}}><div style={{width:"100%",height:"100%",background:`${th.colors[3]}44`,borderRadius:3}}/></div><span style={{fontSize:10,color:tx3,display:"block",marginBottom:8}}>Output</span><div style={{display:"flex",gap:5,marginBottom:18}}>{["Interactive","PDF"].map((t,i)=><button key={t} style={{flex:1,background:i===0?"rgba(255,255,255,0.05)":"transparent",border:`1px solid ${i===0?bd2:bd}`,padding:"7px",fontSize:11,color:i===0?tx:tx3,borderRadius:6,cursor:"pointer"}}>{t}</button>)}</div><span style={{fontSize:10,color:tx3,display:"block",marginBottom:10}}>Options</span>{[{l:"Auto-labels",s:labels,f:setLabels},{l:"Clustering",s:clustering,f:setClustering},{l:"Show legend",s:showLeg,f:setShowLeg}].map(t=><div key={t.l} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}><span style={{fontSize:11,color:tx2}}>{t.l}</span><Toggle on={t.s} onChange={()=>t.f(!t.s)}/></div>)}</div></div></div>)}

// ==================== ROOT ====================
function Atlas(){
  const[page,setPage]=useState("landing");
  const nav=(p)=>{setPage(p);window.scrollTo(0,0)};
  return<div>
    {page==="landing"&&<Landing onEnter={()=>nav("home")} onNav={nav}/>}
    {page==="usecases"&&<UseCases onEnter={()=>nav("home")} onNav={nav}/>}
    {page==="pricing"&&<Pricing onEnter={()=>nav("home")} onNav={nav}/>}
    {page==="enterprise"&&<Enterprise onEnter={()=>nav("home")} onNav={nav}/>}
    {page==="home"&&<Home onLogout={()=>nav("landing")} onOpenEditor={()=>nav("editor")}/>}
    {page==="editor"&&<EditorView onBack={()=>nav("home")}/>}
  </div>;
}
ReactDOM.render(<Atlas/>,document.getElementById("root"));
</script>
